name: publish

# npm Trusted Publishing (OIDC) — token YOK, 2FA YOK.
# registry-url KULLANILMIYOR: setup-node placeholder token yazip OIDC'yi engellemesin.
on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: npm guncelle (OIDC destegi icin >=11.5)
        run: npm install -g npm@latest
      - name: Yayinla (OIDC ile, token'siz)
        run: npm publish --access public
